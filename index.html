<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Finanças do Casal</title>
<meta name="theme-color" content="#0f172a">
<style>
:root{--az:#2563eb;--az2:#1d4ed8;--vd:#16a34a;--vm:#dc2626;--am:#d97706;--bg:#f8fafc;--card:#fff;--txt:#0f172a;--txt2:#475569;--txt3:#94a3b8;--borda:#e2e8f0;--shadow:0 1px 3px rgba(0,0,0,.06);}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
#authScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(160deg,#0f172a 0%,#1e3a8a 60%,#2563eb 100%)}
.auth-card{background:#fff;border-radius:28px;padding:36px 28px;width:100%;max-width:380px;box-shadow:0 25px 60px rgba(0,0,0,.3)}
.auth-logo{text-align:center;margin-bottom:28px}
.auth-logo .icon{font-size:52px;margin-bottom:10px;display:block}
.auth-logo h1{font-size:24px;font-weight:800;color:var(--txt);letter-spacing:-.5px}
.auth-logo p{font-size:13px;color:var(--txt3);margin-top:5px}
.auth-tabs{display:flex;background:#f1f5f9;border-radius:14px;padding:4px;margin-bottom:22px;gap:4px}
.auth-tab{flex:1;padding:9px;border:none;background:transparent;border-radius:10px;font-size:13px;font-weight:700;color:var(--txt2);cursor:pointer;transition:.2s}
.auth-tab.active{background:#fff;color:var(--az);box-shadow:0 1px 4px rgba(0,0,0,.12)}
.auth-err{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.6px}
.form-group input{width:100%;padding:13px 14px;border:1.5px solid var(--borda);border-radius:12px;font-size:15px;color:var(--txt);outline:none;transition:.2s;background:#fafafa}
.form-group input:focus{border-color:var(--az);background:#fff}
.btn-auth{width:100%;padding:15px;background:var(--az);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.auth-note{font-size:12px;color:var(--txt3);text-align:center;margin-top:14px}
#app{display:none;padding-bottom:80px}
.topbar{background:#0f172a;padding:14px 16px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.topbar-left h2{font-size:17px;font-weight:800;color:#fff;letter-spacing:-.3px}
.topbar-left p{font-size:11px;color:rgba(255,255,255,.45);margin-top:1px}
.btn-logout{background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.65);padding:7px 13px;border-radius:10px;font-size:12px;font-weight:600;cursor:pointer}
.navbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1.5px solid var(--borda);display:none;z-index:100;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 4px 8px;border:none;background:transparent;color:var(--txt3);font-size:10px;font-weight:700;cursor:pointer;gap:3px;transition:.15s;letter-spacing:.3px}
.nav-btn.active{color:var(--az)}
.nav-btn svg{width:21px;height:21px;stroke-width:2}
.fab{position:fixed;bottom:82px;right:18px;width:52px;height:52px;background:var(--az);border:none;border-radius:50%;color:#fff;font-size:28px;cursor:pointer;box-shadow:0 4px 16px rgba(37,99,235,.45);display:none;align-items:center;justify-content:center;z-index:99;line-height:1}
.fab:active{transform:scale(.92)}
.page{display:none;padding:16px}
.page.active{display:block}
/* KPI */
.kpi-strip{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
.kpi{background:var(--card);border-radius:14px;padding:12px 10px;box-shadow:var(--shadow);text-align:center}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.kpi-val{font-size:15px;font-weight:800;letter-spacing:-.3px}
.kpi-val.green{color:var(--vd)}.kpi-val.red{color:var(--vm)}.kpi-val.orange{color:var(--am)}
/* Saldo badge */
.saldo-badge{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-radius:14px;margin-bottom:20px;font-weight:700;font-size:14px}
.saldo-badge.pos{background:#f0fdf4;color:var(--vd)}.saldo-badge.neg{background:#fef2f2;color:var(--vm)}
/* Fechamento block */
.fech-block{margin-bottom:24px}
.fech-block-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.fech-block-title{font-size:14px;font-weight:800;color:var(--txt)}
.fech-tag{font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px}
.tag-15{background:#dbeafe;color:#1d4ed8}.tag-30{background:#ede9fe;color:#6d28d9}
.fech-pills{display:flex;gap:8px;margin-bottom:10px}
.fech-pill{flex:1;background:var(--card);border-radius:12px;padding:9px 8px;box-shadow:var(--shadow);text-align:center}
.fech-pill .pl{font-size:10px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.3px}
.fech-pill .pv{font-size:13px;font-weight:800;margin-top:3px}
/* Section header */
.sec-hdr{font-size:11px;font-weight:700;color:var(--txt3);text-transform:uppercase;letter-spacing:.6px;margin:12px 0 6px;padding-left:2px}
/* Item */
.item-card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:6px}
.item-row{display:flex;align-items:center;padding:12px 13px;gap:10px}
.item-emoji{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.item-info{flex:1;min-width:0}
.item-desc{font-size:14px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{font-size:11px;color:var(--txt3);margin-top:2px}
.item-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.item-val{font-size:15px;font-weight:800;letter-spacing:-.3px}
.item-val.d{color:var(--vm)}.item-val.r{color:var(--vd)}
.pago-toggle{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:20px;border:none;cursor:pointer;font-size:11px;font-weight:700;transition:.15s;white-space:nowrap}
.pago-toggle.pago{background:#dcfce7;color:#15803d}
.pago-toggle.pend{background:#fff7ed;color:#b45309;border:1px solid #fed7aa}
.pago-toggle:active{transform:scale(.94)}
.item-acts{display:flex;gap:5px;margin-top:1px}
.btn-sm{font-size:10px;font-weight:700;padding:3px 9px;border-radius:8px;border:none;cursor:pointer}
.be{background:#eff6ff;color:var(--az)}.bd{background:#fef2f2;color:var(--vm)}
/* Mes bar */
.mes-bar{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:14px;padding:11px 14px;margin-bottom:16px;box-shadow:var(--shadow)}
.mes-bar button{background:none;border:none;font-size:22px;cursor:pointer;color:var(--az);width:32px;line-height:1}
.mes-label{font-size:15px;font-weight:700;color:var(--txt)}
/* Rec card */
.rec-item{background:var(--card);border-radius:14px;padding:14px;box-shadow:var(--shadow);margin-bottom:8px}
.rec-top{display:flex;justify-content:space-between;align-items:flex-start}
.rec-nome{font-size:14px;font-weight:700;color:var(--txt)}
.rec-val{font-size:15px;font-weight:800}
.rec-meta{font-size:11px;color:var(--txt3);margin-top:4px}
.rec-btns{display:flex;gap:6px;margin-top:10px}
/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;opacity:0;pointer-events:none;transition:.22s}
.overlay.open{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:24px 24px 0 0;padding:24px 20px 36px;width:100%;max-height:88vh;overflow-y:auto;transform:translateY(100%);transition:.22s cubic-bezier(.4,0,.2,1)}
.overlay.open .modal{transform:translateY(0)}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-hdr h3{font-size:17px;font-weight:800}
.modal-close{background:#f1f5f9;border:none;width:30px;height:30px;border-radius:50%;font-size:16px;cursor:pointer;color:var(--txt2)}
.field{margin-bottom:14px}
.field label{display:block;font-size:11px;font-weight:700;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
.field input,.field select{width:100%;padding:12px 13px;border:1.5px solid var(--borda);border-radius:12px;font-size:15px;color:var(--txt);outline:none;background:#fafafa;transition:.15s}
.field input:focus,.field select:focus{border-color:var(--az);background:#fff}
.tipo-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tipo-btn{padding:11px;border:2px solid var(--borda);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;background:#fff;transition:.15s;text-align:center}
.tipo-btn.sel-d{border-color:var(--vm);background:#fef2f2;color:var(--vm)}
.tipo-btn.sel-r{border-color:var(--vd);background:#f0fdf4;color:var(--vd)}
.btn-save{width:100%;padding:14px;background:var(--az);color:#fff;border:none;border-radius:14px;font-size:15px;font-weight:700;cursor:pointer;margin-top:10px}
.empty-state{text-align:center;padding:28px 16px;color:var(--txt3);font-size:13px}
.loading{display:flex;flex-direction:column;align-items:center;padding:36px;gap:10px;color:var(--txt3);font-size:13px}
.spinner{width:24px;height:24px;border:2.5px solid var(--borda);border-top-color:var(--az);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="authScreen">
  <div class="auth-card">
    <div class="auth-logo"><span class="icon">💰</span><h1>Finanças do Casal</h1><p>Controle financeiro em tempo real</p></div>
    <div class="auth-tabs">
      <button class="auth-tab active" onclick="switchTab('login')">Entrar</button>
      <button class="auth-tab" onclick="switchTab('cadastro')">Cadastrar</button>
    </div>
    <div class="auth-err" id="authErr"></div>
    <div id="tabLogin">
      <div class="form-group"><label>E-mail</label><input id="lEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Senha</label><input id="lSenha" type="password" placeholder="••••••••" autocomplete="current-password"></div>
      <button class="btn-auth" onclick="fazerLogin()">Entrar →</button>
      <p class="auth-note">Acesso restrito ao casal.</p>
    </div>
    <div id="tabCadastro" style="display:none">
      <div class="form-group"><label>Seu nome</label><input id="cNome" placeholder="Como quer ser chamado(a)"></div>
      <div class="form-group"><label>E-mail</label><input id="cEmail" type="email" placeholder="seu@email.com" autocomplete="email"></div>
      <div class="form-group"><label>Senha</label><input id="cSenha" type="password" placeholder="Mínimo 6 caracteres" autocomplete="new-password"></div>
      <button class="btn-auth" onclick="fazerCadastro()">Criar conta →</button>
      <p class="auth-note">Crie sua conta para acessar.</p>
    </div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-left"><h2>💰 Finanças</h2><p id="topUser">—</p></div>
    <button class="btn-logout" onclick="fazerLogout()">Sair</button>
  </div>
  <div id="pageHome" class="page active"><div id="homeContent"><div class="loading"><div class="spinner"></div>Carregando...</div></div></div>
  <div id="pageHist" class="page">
    <div class="mes-bar">
      <button onclick="mudarMesHist(-1)">‹</button>
      <span class="mes-label" id="mesLabelHist">—</span>
      <button onclick="mudarMesHist(1)">›</button>
    </div>
    <div id="histContent"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  </div>
  <div id="pageRec" class="page">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <span style="font-size:16px;font-weight:800">Contas Recorrentes</span>
      <button onclick="abrirModalRec()" style="background:var(--az);color:#fff;border:none;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer">+ Nova</button>
    </div>
    <div id="listaRec"><div class="loading"><div class="spinner"></div>Carregando...</div></div>
  </div>
</div>

<button class="fab" id="fabBtn" onclick="abrirModal()">+</button>

<nav class="navbar" id="navbar">
  <button class="nav-btn active" id="nav0" onclick="showPage(0)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Início
  </button>
  <button class="nav-btn" id="nav1" onclick="showPage(1)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Histórico
  </button>
  <button class="nav-btn" id="nav2" onclick="showPage(2)">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Recorrentes
  </button>
</nav>

<!-- MODAL LANÇAMENTO -->
<div class="overlay" id="overlayLanc">
  <div class="modal">
    <div class="modal-hdr"><h3 id="modalTitulo">Novo lançamento</h3><button class="modal-close" onclick="fecharModal()">✕</button></div>
    <input type="hidden" id="mId">
    <div class="field"><label>Tipo</label><div class="tipo-btns"><button class="tipo-btn sel-d" id="btnD" onclick="setTipo('despesa')">💸 Despesa</button><button class="tipo-btn" id="btnR" onclick="setTipo('receita')">💰 Receita</button></div></div>
    <div class="field"><label>Descrição</label><input id="mDesc" placeholder="Ex: Supermercado, Salário..."></div>
    <div class="field"><label>Valor (R$)</label><input id="mValor" type="number" placeholder="0,00" step="0.01" min="0"></div>
    <div class="field"><label>Categoria</label>
      <select id="mCat"><option value="🏠">🏠 Moradia</option><option value="🍽️">🍽️ Alimentação</option><option value="🚗">🚗 Transporte</option><option value="💊">💊 Saúde</option><option value="🎓">🎓 Educação</option><option value="🎮">🎮 Lazer</option><option value="👕">👕 Vestuário</option><option value="💼">💼 Trabalho</option><option value="💳">💳 Cartão/Financ.</option><option value="💵">💵 Salário</option><option value="📦">📦 Outros</option></select>
    </div>
    <div class="field"><label>Fechamento</label><select id="mFech"><option value="15">Dia 15</option><option value="30">Dia 30</option></select></div>
    <div class="field" id="fieldPago"><label>Status</label><select id="mPago"><option value="nao">⏳ Pendente</option><option value="sim">✅ Pago</option></select></div>
    <button class="btn-save" onclick="salvarLanc()">Salvar lançamento</button>
  </div>
</div>

<!-- MODAL RECORRENTE -->
<div class="overlay" id="overlayRec">
  <div class="modal">
    <div class="modal-hdr"><h3>Nova recorrente</h3><button class="modal-close" onclick="fecharModalRec()">✕</button></div>
    <input type="hidden" id="rId">
    <div class="field"><label>Tipo</label><select id="rTipo"><option value="despesa">💸 Despesa</option><option value="receita">💰 Receita</option></select></div>
    <div class="field"><label>Descrição</label><input id="rDesc" placeholder="Ex: Aluguel, Salário..."></div>
    <div class="field"><label>Valor padrão (R$)</label><input id="rValor" type="number" placeholder="0,00" step="0.01" min="0"></div>
    <div class="field"><label>Categoria</label><select id="rCat"><option value="🏠">🏠 Moradia</option><option value="🍽️">🍽️ Alimentação</option><option value="🚗">🚗 Transporte</option><option value="💊">💊 Saúde</option><option value="💵">💵 Salário</option><option value="💳">💳 Cartão/Financ.</option><option value="📦">📦 Outros</option></select></div>
    <div class="field"><label>Fechamento</label><select id="rFech"><option value="15">Dia 15</option><option value="30">Dia 30</option></select></div>
    <div class="field"><label>Valor variável?</label><select id="rVariavel"><option value="nao">Não — valor fixo</option><option value="sim">Sim — ajusto por mês</option></select></div>
    <button class="btn-save" onclick="salvarRec()">Salvar</button>
  </div>
</div>

<!-- MODAL VALOR VARIÁVEL -->
<div class="overlay" id="overlayVal">
  <div class="modal">
    <div class="modal-hdr"><h3 id="vTitulo">Atualizar valor</h3><button class="modal-close" onclick="fecharModalVal()">✕</button></div>
    <input type="hidden" id="vRecId"><input type="hidden" id="vMes">
    <div class="field"><label>Valor deste mês (R$)</label><input id="vValor" type="number" placeholder="0,00" step="0.01"></div>
    <button class="btn-save" onclick="salvarValorVariavel()">Salvar</button>
  </div>
</div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,updateProfile}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,push,set,get,onValue,remove}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const CFG={apiKey:'AIzaSyC54FUgmARdcGjy1tOVNerFMPvcBL921MI',authDomain:'despesas-c2f24.firebaseapp.com',databaseURL:'https://despesas-c2f24-default-rtdb.firebaseio.com',projectId:'despesas-c2f24'};
const app=initializeApp(CFG);
const auth=getAuth(app);
const db=getDatabase(app);

let user=null,userName='',tipoAtual='despesa',currentPage=0;
let mesHist=new Date().toISOString().slice(0,7);
let unsubHome=null,unsubRec=null;

const $=id=>document.getElementById(id);
const R=v=>'R$ '+Number(v||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
const MESES=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const mesNome=m=>{const[y,mo]=m.split('-');return MESES[parseInt(mo)-1]+' '+y;};
const mesAtual=()=>new Date().toISOString().slice(0,7);
const fmtTs=ts=>{const d=new Date(ts),now=new Date(),diff=Math.floor((now-d)/1000);if(diff<60)return'agora';if(diff<3600)return Math.floor(diff/60)+'min';if(diff<86400)return Math.floor(diff/3600)+'h';return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'short'});};

// AUTH
window.switchTab=t=>{
  $('tabLogin').style.display=t==='login'?'':'none';
  $('tabCadastro').style.display=t==='cadastro'?'':'none';
  document.querySelectorAll('.auth-tab').forEach((b,i)=>b.classList.toggle('active',(t==='login'&&i===0)||(t==='cadastro'&&i===1)));
  $('authErr').style.display='none';
};
function showErr(msg){$('authErr').textContent=msg;$('authErr').style.display='block';}
window.fazerLogin=async()=>{
  const email=$('lEmail').value.trim(),senha=$('lSenha').value;
  if(!email||!senha){showErr('Preencha e-mail e senha');return;}
  try{await signInWithEmailAndPassword(auth,email,senha);}
  catch(e){showErr(e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found'?'E-mail ou senha incorretos':'Erro ao entrar.');}
};
window.fazerCadastro=async()=>{
  const nome=$('cNome').value.trim(),email=$('cEmail').value.trim(),senha=$('cSenha').value;
  if(!nome||!email||!senha){showErr('Preencha todos os campos');return;}
  if(senha.length<6){showErr('Senha: mínimo 6 caracteres');return;}
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,senha);
    await updateProfile(cred.user,{displayName:nome});
    await set(ref(db,`usuarios_financas/${cred.user.uid}`),{nome,email});
  }catch(e){showErr(e.code==='auth/email-already-in-use'?'E-mail já cadastrado':'Erro ao cadastrar.');}
};
window.fazerLogout=async()=>{if(unsubHome)unsubHome();if(unsubRec)unsubRec();await signOut(auth);};

onAuthStateChanged(auth,u=>{
  if(u){
    user=u;userName=u.displayName||u.email.split('@')[0];
    $('topUser').textContent=userName;
    $('authScreen').style.display='none';
    $('app').style.display='block';
    $('navbar').style.display='flex';
    $('fabBtn').style.display='flex';
    $('mesLabelHist').textContent=mesNome(mesHist);
    loadHome();loadRec();
  }else{
    user=null;
    $('authScreen').style.display='flex';
    $('app').style.display='none';
    $('navbar').style.display='none';
    $('fabBtn').style.display='none';
  }
});

// NAVEGAÇÃO
window.showPage=p=>{
  currentPage=p;
  ['pageHome','pageHist','pageRec'].forEach((id,i)=>$(id).classList.toggle('active',i===p));
  ['nav0','nav1','nav2'].forEach((id,i)=>$(id).classList.toggle('active',i===p));
  $('fabBtn').style.display=p===2?'none':'flex';
  if(p===1)renderHist();
};

// DADOS
async function getSnap(){
  const[l,r,p,v]=await Promise.all([get(ref(db,'lancamentos')),get(ref(db,'recorrentes')),get(ref(db,'pagamentos_rec')),get(ref(db,'valores_variaveis'))]);
  return{l,r,p,v};
}
function buildItems(mes,l,r,p,v){
  const items=[];
  if(l&&l.exists())l.forEach(c=>{const d=c.val();if(d.mes===mes)items.push({...d,id:c.key,isRec:false});});
  if(r&&r.exists())r.forEach(c=>{
    const d=c.val();
    const pago=p&&p.exists()&&p.child(c.key).child(mes).exists()?p.child(c.key).child(mes).val():'nao';
    const val=v&&v.exists()&&v.child(c.key).child(mes).exists()?v.child(c.key).child(mes).val():d.valor;
    items.push({...d,id:c.key,isRec:true,pago,valor:val,desc:d.desc||d.nome});
  });
  return items;
}

// HOME
function loadHome(){
  if(!user)return;
  if(unsubHome)unsubHome();
  $('homeContent').innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  unsubHome=onValue(ref(db,'lancamentos'),async()=>{
    const{l,r,p,v}=await getSnap();
    renderHome(l,r,p,v);
  });
}
function renderHome(l,r,p,v){
  const mes=mesAtual();
  const todos=buildItems(mes,l,r,p,v);
  const f15=todos.filter(i=>(i.fech||30)==15);
  const f30=todos.filter(i=>(i.fech||30)==30);
  let totR=0,totD=0,aPagar=0;
  todos.forEach(i=>{if(i.tipo==='receita')totR+=Number(i.valor||0);else{totD+=Number(i.valor||0);if(i.pago!=='sim')aPagar+=Number(i.valor||0);}});
  const saldo=totR-totD;
  let html=`
    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-lbl">Receitas</div><div class="kpi-val green">${R(totR)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Despesas</div><div class="kpi-val red">${R(totD)}</div></div>
      <div class="kpi"><div class="kpi-lbl">A pagar</div><div class="kpi-val orange">${R(aPagar)}</div></div>
    </div>
    <div class="saldo-badge ${saldo>=0?'pos':'neg'}"><span>Saldo — ${mesNome(mes)}</span><span>${R(saldo)}</span></div>
  `;
  html+=buildBlock(f15,'📅 Fechamento Dia 15','tag-15',mes);
  html+=buildBlock(f30,'📅 Fechamento Dia 30','tag-30',mes);
  $('homeContent').innerHTML=html;
}

function buildBlock(items,titulo,tagCls,mes){
  const desps=items.filter(i=>i.tipo==='despesa');
  const recs=items.filter(i=>i.tipo==='receita');
  const totD=desps.reduce((s,i)=>s+Number(i.valor||0),0);
  const totR=recs.reduce((s,i)=>s+Number(i.valor||0),0);
  const saldo=totR-totD;
  let html=`<div class="fech-block">
    <div class="fech-block-hdr"><span class="fech-block-title">${titulo}</span><span class="fech-tag ${tagCls}">${items.length} itens</span></div>
    <div class="fech-pills">
      <div class="fech-pill"><div class="pl">Despesas</div><div class="pv" style="color:var(--vm)">${R(totD)}</div></div>
      <div class="fech-pill"><div class="pl">Receitas</div><div class="pv" style="color:var(--vd)">${R(totR)}</div></div>
      <div class="fech-pill"><div class="pl">Saldo</div><div class="pv" style="color:${saldo>=0?'var(--vd)':'var(--vm)'}">${R(saldo)}</div></div>
    </div>`;
  if(recs.length){html+=`<div class="sec-hdr">💰 Recebimentos</div>`;recs.forEach(i=>{html+=itemHTML(i,mes);});}
  if(desps.length){html+=`<div class="sec-hdr">💸 Despesas</div>`;desps.forEach(i=>{html+=itemHTML(i,mes);});}
  if(!items.length)html+=`<div class="empty-state">Nenhum lançamento neste fechamento</div>`;
  html+=`</div>`;
  return html;
}

function itemHTML(i,mes){
  const isD=i.tipo==='despesa';
  const bg=isD?'#fef2f2':'#f0fdf4';
  const pagoBtn=isD?`<button class="pago-toggle ${i.pago==='sim'?'pago':'pend'}" onclick="${i.isRec?`togglePagoRec('${i.id}','${mes}','${i.pago}')`:`togglePago('${i.id}','${i.pago}')`}">${i.pago==='sim'?'✅ Pago':'⏳ Pendente'}</button>`:'';
  const acts=!i.isRec?`<div class="item-acts"><button class="btn-sm be" onclick="editarItem('${i.id}')">✏️ Editar</button><button class="btn-sm bd" onclick="excluirItem('${i.id}')">🗑️</button></div>`:'';
  const varBtn=i.isRec&&i.variavel==='sim'?`<button class="btn-sm be" onclick="abrirModalVal('${i.id}','${mes}',${i.valor},'${(i.desc||'').replace(/'/g,"\\'")}')">✏️ Valor</button>`:'';
  return`<div class="item-card"><div class="item-row">
    <div class="item-emoji" style="background:${bg}">${i.cat||'📦'}</div>
    <div class="item-info">
      <div class="item-desc">${i.desc||'—'}${i.isRec?' <span style="font-size:10px;opacity:.5">🔁</span>':''}</div>
      <div class="item-meta">${i.quem_nome||userName}${i.ts?' · '+fmtTs(i.ts):''}</div>
    </div>
    <div class="item-right">
      <span class="item-val ${isD?'d':'r'}">${R(i.valor)}</span>
      ${pagoBtn}${acts}${varBtn}
    </div>
  </div></div>`;
}

// HISTÓRICO
window.mudarMesHist=d=>{
  const[y,m]=mesHist.split('-').map(Number);
  const nd=new Date(y,m-1+d,1);
  mesHist=`${nd.getFullYear()}-${String(nd.getMonth()+1).padStart(2,'0')}`;
  $('mesLabelHist').textContent=mesNome(mesHist);
  renderHist();
};
async function renderHist(){
  $('histContent').innerHTML='<div class="loading"><div class="spinner"></div>Carregando...</div>';
  const{l,r,p,v}=await getSnap();
  const todos=buildItems(mesHist,l,r,p,v);
  const desps=todos.filter(i=>i.tipo==='despesa');
  const recs=todos.filter(i=>i.tipo==='receita');
  const totD=desps.reduce((s,i)=>s+Number(i.valor||0),0);
  const totR=recs.reduce((s,i)=>s+Number(i.valor||0),0);
  const saldo=totR-totD;
  const aPagar=desps.filter(i=>i.pago!=='sim').reduce((s,i)=>s+Number(i.valor||0),0);
  if(!todos.length){$('histContent').innerHTML='<div class="empty-state">Nenhum lançamento neste mês</div>';return;}
  let html=`
    <div class="kpi-strip">
      <div class="kpi"><div class="kpi-lbl">Receitas</div><div class="kpi-val green">${R(totR)}</div></div>
      <div class="kpi"><div class="kpi-lbl">Despesas</div><div class="kpi-val red">${R(totD)}</div></div>
      <div class="kpi"><div class="kpi-lbl">A pagar</div><div class="kpi-val orange">${R(aPagar)}</div></div>
    </div>
    <div class="saldo-badge ${saldo>=0?'pos':'neg'}" style="margin-bottom:18px"><span>Saldo</span><span>${R(saldo)}</span></div>`;
  if(recs.length){html+=`<div class="sec-hdr">💰 Recebimentos</div>`;recs.forEach(i=>{html+=itemHTML(i,mesHist);});}
  if(desps.length){html+=`<div class="sec-hdr">💸 Despesas</div>`;desps.forEach(i=>{html+=itemHTML(i,mesHist);});}
  $('histContent').innerHTML=html;
}

// RECORRENTES
function loadRec(){
  if(!user)return;
  if(unsubRec)unsubRec();
  unsubRec=onValue(ref(db,'recorrentes'),snap=>{
    if(!snap.exists()){$('listaRec').innerHTML='<div class="empty-state">Nenhuma conta recorrente cadastrada</div>';return;}
    let html='';
    snap.forEach(c=>{
      const r=c.val();
      html+=`<div class="rec-item"><div class="rec-top"><span class="rec-nome">${r.cat||'📦'} ${r.desc||r.nome||'—'} 🔁</span><span class="rec-val" style="color:${r.tipo==='despesa'?'var(--vm)':'var(--vd)'}">${R(r.valor)}</span></div><div class="rec-meta">Fecha dia ${r.fech||30} · ${r.tipo==='despesa'?'Despesa':'Receita'}${r.variavel==='sim'?' · Valor variável':''}</div><div class="rec-btns"><button class="btn-sm bd" onclick="excluirRec('${c.key}')">🗑️ Remover</button></div></div>`;
    });
    $('listaRec').innerHTML=html;
  });
}

// MODAL LANÇAMENTO
window.abrirModal=id=>{
  if(id){
    get(ref(db,'lancamentos/'+id)).then(s=>{
      if(!s.exists())return;
      const v=s.val();
      $('mId').value=id;$('modalTitulo').textContent='Editar lançamento';
      $('mDesc').value=v.desc||'';$('mValor').value=v.valor||'';
      $('mCat').value=v.cat||'📦';$('mFech').value=v.fech||30;$('mPago').value=v.pago||'nao';
      setTipo(v.tipo||'despesa');$('overlayLanc').classList.add('open');
    });
  }else{
    $('mId').value='';$('modalTitulo').textContent='Novo lançamento';
    $('mDesc').value='';$('mValor').value='';$('mCat').value='🏠';$('mFech').value='30';$('mPago').value='nao';
    setTipo('despesa');$('overlayLanc').classList.add('open');
  }
};
window.fecharModal=()=>$('overlayLanc').classList.remove('open');
window.setTipo=t=>{
  tipoAtual=t;
  $('btnD').className='tipo-btn '+(t==='despesa'?'sel-d':'');
  $('btnR').className='tipo-btn '+(t==='receita'?'sel-r':'');
  $('fieldPago').style.display=t==='despesa'?'':'none';
};
window.salvarLanc=async()=>{
  const desc=$('mDesc').value.trim(),valor=parseFloat($('mValor').value);
  if(!desc){alert('Digite a descrição');return;}
  if(!valor||valor<=0){alert('Digite um valor válido');return;}
  const mes=currentPage===1?mesHist:mesAtual();
  const item={desc,valor,tipo:tipoAtual,cat:$('mCat').value,fech:parseInt($('mFech').value),
    pago:tipoAtual==='despesa'?$('mPago').value:'sim',mes,quem:user.uid,quem_nome:userName,ts:Date.now()};
  const id=$('mId').value;
  if(id)await set(ref(db,'lancamentos/'+id),item);
  else await push(ref(db,'lancamentos'),item);
  fecharModal();
  if(currentPage===1)renderHist();
};
window.editarItem=id=>abrirModal(id);
window.excluirItem=id=>{if(confirm('Excluir este lançamento?'))remove(ref(db,'lancamentos/'+id));};
window.togglePago=async(id,atual)=>{
  await set(ref(db,'lancamentos/'+id+'/pago'),atual==='sim'?'nao':'sim');
  if(currentPage===1)renderHist();
};
window.togglePagoRec=async(recId,mes,atual)=>{
  await set(ref(db,`pagamentos_rec/${recId}/${mes}`),atual==='sim'?'nao':'sim');
  if(currentPage===1)renderHist();
};

// MODAL RECORRENTE
window.abrirModalRec=()=>{$('rId').value='';$('rDesc').value='';$('rValor').value='';$('overlayRec').classList.add('open');};
window.fecharModalRec=()=>$('overlayRec').classList.remove('open');
window.salvarRec=async()=>{
  const desc=$('rDesc').value.trim(),valor=parseFloat($('rValor').value);
  if(!desc||!valor||valor<=0){alert('Preencha descrição e valor');return;}
  const item={desc,valor,tipo:$('rTipo').value,cat:$('rCat').value,fech:parseInt($('rFech').value),variavel:$('rVariavel').value};
  const id=$('rId').value;
  if(id)await set(ref(db,'recorrentes/'+id),item);
  else await push(ref(db,'recorrentes'),item);
  fecharModalRec();
};
window.excluirRec=id=>{if(confirm('Remover esta recorrente?'))remove(ref(db,'recorrentes/'+id));};

// MODAL VALOR VARIÁVEL
window.abrirModalVal=(recId,mes,val,desc)=>{$('vRecId').value=recId;$('vMes').value=mes;$('vValor').value=val;$('vTitulo').textContent='Atualizar: '+desc;$('overlayVal').classList.add('open');};
window.fecharModalVal=()=>$('overlayVal').classList.remove('open');
window.salvarValorVariavel=async()=>{
  const val=parseFloat($('vValor').value);
  if(!val||isNaN(val)){alert('Digite um valor válido');return;}
  await set(ref(db,`valores_variaveis/${$('vRecId').value}/${$('vMes').value}`),val);
  fecharModalVal();
  if(currentPage===1)renderHist();
};
</script>
</body>
